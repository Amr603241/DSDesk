<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DSDesk PRO MAX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- ═══════════════ Unified Sidebar ═══════════════ -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="brand">
        <div class="brand-logo"><i class="fas fa-bolt"></i></div>
      </div>
      <nav class="nav-menu">
        <button class="nav-btn active" data-view="home"><i class="fas fa-th-large"></i><span>الرئيسية</span></button>
        <button class="nav-btn" data-view="remote"><i class="fas fa-desktop"></i><span>التحكم</span></button>
        <button class="nav-btn" data-view="files"><i class="fas fa-folder-open"></i><span>الملفات</span></button>
        <button class="nav-btn" data-view="security"><i class="fas fa-shield-halved"></i><span>الأمان</span></button>
      </nav>
    </div>
    <div class="sidebar-bottom">
      <button class="nav-btn" id="btn-settings-side"><i class="fas fa-cog"></i><span>الإعدادات</span></button>
      <div class="user-status">
        <span class="status-dot status-offline" id="global-status-dot"></span>
        <span id="global-status-text">OFFLINE</span>
      </div>
    </div>
  </aside>

  <!-- ═══════════════ Main Workspace ═══════════════ -->
  <main class="workspace">
    
    <!-- Custom Titlebar (Integrated) -->
    <header class="header">
      <div class="header-search">
        <i class="fas fa-search"></i>
        <input type="text" id="remote-id" placeholder="أدخل ID الجهاز البعيد...">
        <button id="btn-connect" class="btn-turbo">اتصال سريع</button>
      </div>
      <div class="window-controls">
        <button id="btn-minimize"><i class="fas fa-minus"></i></button>
        <button id="btn-maximize"><i class="fas fa-expand"></i></button>
        <button id="btn-close"><i class="fas fa-times"></i></button>
      </div>
    </header>

    <div class="content-area">
      
      <!-- DASHBOARD VIEW -->
      <section class="view active" id="view-home">
        <div class="welcome-banner">
          <h1>مرحباً بك في <span class="gradient-text">DSDesk Pro Max</span></h1>
          <p>نظام التحكم عن بعد الأكثر ذكاءً وأماناً.</p>
        </div>

        <div class="grid-layout">
          <!-- Identity Card -->
          <div class="glass-card identity-card">
            <div class="card-label">هويتك الرقمية</div>
            <div class="id-value-large" id="device-id">--- --- ---</div>
            <div class="pwd-section">
              <span class="text-dim">كلمة المرور:</span>
              <span id="device-password" class="pwd-value">••••••</span>
              <div class="pwd-actions">
                <button id="btn-toggle-pwd"><i class="far fa-eye"></i></button>
                <button id="btn-refresh-pwd"><i class="fas fa-sync"></i></button>
              </div>
            </div>
            <button id="btn-copy-id" class="btn-outline-primary"><i class="far fa-copy"></i> نسخ المعرّف</button>
          </div>

          <!-- Performance Card -->
          <div class="glass-card stats-card">
            <div class="card-label">أداء النظام</div>
            <div class="stat-row">
              <div class="stat-info">
                <span>المعالج (CPU)</span>
                <span id="dash-cpu-text">0%</span>
              </div>
              <div class="progress-bg"><div id="dash-cpu-bar" class="progress-fill primary"></div></div>
            </div>
            <div class="stat-row">
              <div class="stat-info">
                <span>الذاكرة (RAM)</span>
                <span id="dash-ram-text">0%</span>
              </div>
              <div class="progress-bg"><div id="dash-ram-bar" class="progress-fill secondary"></div></div>
            </div>
          </div>

          <!-- Recent Connections -->
          <div class="glass-card recent-connections">
            <div class="card-label">الاتصالات الأخيرة</div>
            <div class="recent-list" id="recent-list">
              <div class="empty-state">لا توجد اتصالات حديثة</div>
            </div>
          </div>
        </div>
      </section>

      <!-- SESSION VIEW (Full screen overlay) -->
      <section class="view" id="view-session">
        <div class="remote-viewport">
          <video id="remote-video" autoplay muted playsinline></video>
          
          <!-- Floating Toolset -->
          <div class="floating-toolbar">
            <button class="tool-btn" id="btn-files-toggle" title="الملفات"><i class="fas fa-folder-open"></i></button>
            <button class="tool-btn" id="btn-tasks-toggle" title="المهام"><i class="fas fa-tasks"></i></button>
            <button class="tool-btn" id="btn-chat-toggle" title="المحادثة"><i class="fas fa-comments"></i></button>
            <div class="tool-sep"></div>
            <button class="tool-btn disconnect" id="btn-disconnect" title="إنهاء"><i class="fas fa-power-off"></i></button>
          </div>

          <!-- Performance HUD -->
          <div class="hud-stats">
            <div class="hud-item"><span>Latency:</span> <span id="stat-latency">--ms</span></div>
            <div class="hud-item"><span>FPS:</span> <span id="stat-fps">--</span></div>
          </div>
        </div>
      </section>

    </div>
  </main>

  <!-- Modals -->
  <div class="modal-overlay" id="modal-request">
    <div class="modal glass">
      <h3>طلب اتصال وارد</h3>
      <p>الجهاز <strong id="request-from-id">---</strong> يطلب التحكم بك.</p>
      <div class="modal-actions">
        <button id="btn-accept" class="btn-primary">قبول</button>
        <button id="btn-reject" class="btn-secondary">رفض</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="js/ui.js"></script>
  <script src="js/signaling.js"></script>
  <script src="js/webrtc.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
